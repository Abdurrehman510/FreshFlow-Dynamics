# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/perishable_platform?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=Abdurrehman
spring.datasource.password=${DB_PASSWORD:Mycat&123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=PerishableAPI-Pool

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=PerishablePlatformSuperSecretKeyThatIsAtLeast256BitsLong2024!
jwt.expiration-ms=86400000

# ── CORS (React dev server) ───────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Logging ──────────────────────────────────────────────────
logging.file.name=logs/perishable-platform.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n